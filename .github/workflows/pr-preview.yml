name: PR Preview Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify and build dashboard
        id: verify
        run: |
          python verify_dashboard.py _site 2>&1 | tee verify_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-preview-pr-${{ github.event.pull_request.number }}
          path: _site/
          retention-days: 7

      - name: Comment on PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const exitCode = '${{ steps.verify.outputs.exit_code }}';
            const passed = exitCode === '0';

            let verifyOutput = '';
            try {
              verifyOutput = fs.readFileSync('verify_output.txt', 'utf8');
            } catch (e) {
              verifyOutput = 'Could not read verification output.';
            }

            const lines = verifyOutput.trim().split('\n');
            const summaryLines = lines.slice(-10).join('\n');

            const statusEmoji = passed ? '\u2705' : '\u274c';
            const statusText = passed ? 'PASSED' : 'FAILED';

            const body = [
              `## \ud83c\udccf Dashboard Preview \u2014 Validation ${statusEmoji} ${statusText}`,
              '',
              `Build completed for PR #${context.payload.pull_request.number}.`,
              '',
              '### Validation Results',
              '```',
              summaryLines,
              '```',
              '',
              passed
                ? '**All automated checks passed.** Ready for human review.'
                : '**Automated checks found issues.** Please review the errors above.',
              '',
              `**[Download preview artifact](${runUrl}#artifacts)**`,
              '',
              'To view locally:',
              '1. Download and extract the artifact zip',
              '2. Open `index.html` in your browser, or:',
              '3. Copy into `_site/` and run `python -m http.server 8000 --directory _site`',
              '',
              `[View full workflow run](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('Dashboard Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
            }
